<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HSB Patient Membership Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loader {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-block;
      position: relative;
      border: 3px solid;
      border-color: #FFF #FFF transparent transparent;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -24px;
      margin-left: -24px;
      z-index: 9999;
      background: transparent;
    }
    .loader::after,
    .loader::before {
      content: '';  
      box-sizing: border-box;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
      border: 3px solid;
      border-color: transparent transparent #FF3D00 #FF3D00;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      animation: rotationBack 0.5s linear infinite;
      transform-origin: center center;
    }
    .loader::before {
      width: 32px;
      height: 32px;
      border-color: #FFF #FFF transparent transparent;
      animation: rotation 1.5s linear infinite;
    }
        
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    } 
    @keyframes rotationBack {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    #loaderOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9998;
    }

    /* Viewfinder Overlays */
    .viewfinder-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      overflow: hidden;
    }

    .viewfinder-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .viewfinder-mask {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.5);
    }

    .viewfinder-box {
      position: relative;
      width: 250px;
      height: 250px;
      border: 2px solid #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      z-index: 10;
    }
    
    .viewfinder-box::before {
      content: '';
      position: absolute;
      top: -5px; left: -5px; width: 20px; height: 20px;
      border-top: 4px solid #ef4444; border-left: 4px solid #ef4444;
    }
    .viewfinder-box::after {
      content: '';
      position: absolute;
      bottom: -5px; right: -5px; width: 20px; height: 20px;
      border-bottom: 4px solid #ef4444; border-right: 4px solid #ef4444;
    }

    @media (max-width: 640px) {
      .viewfinder-box {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

></option><option value="Sherpur"></option><option value="Sirajganj"></option><option value="Sunamganj"></option><option value="Sylhet"></option><option value="Tangail"></option><option value="Thakurgaon"></option>

        </div>

          <input type="number" id="children" value="0" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="nationality" class="block text-sm font-medium text-gray-700">Nationality</label>
          <input type="text" id="nationality" value="Bangladeshi" readonly class="mt-1 block w-full p-3 border border-gray-300 rounded-md bg-gray-100" />
        </div>
      </div>

      <!-- Row 11: Status & Organs -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <!-- Webcam Modal -->
  <div id="webcamModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-[10000] flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 w-full max-w-lg shadow-xl">
      <h3 class="text-xl font-bold text-gray-800 mb-4">Capture Patient Photo</h3>
      <div class="viewfinder-container rounded-lg">
        <video id="webcamVideo" autoplay playsinline class="w-full h-full object-cover"></video>
        <div class="viewfinder-overlay">
          <div class="viewfinder-mask"></div>
          <div id="viewfinderBox" class="viewfinder-box"></div>
        </div>
      </div>
      <canvas id="webcamCanvas" class="hidden"></canvas>
      <div class="mt-6 flex justify-end space-x-3">
        <button type="button" id="closeWebcamBtn" class="px-5 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400 font-medium">Cancel</button>
        <button type="button" id="captureBtn" class="px-5 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium">Capture Photo</button>
      </div>
    </div>
  </div>

  <div id="loaderOverlay"><div class="loader"></div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7QLBLarDiqdpYy5jw8_1e-gTR-aR1Wqc",
      authDomain: "hemophilia-society-of-bd.firebaseapp.com",
      projectId: "hemophilia-society-of-bd",
      storageBucket: "hemophilia-society-of-bd.firebasestorage.app",
      messagingSenderId: "674332798483",
      appId: "1:674332798483:web:cedb62cb05e03b5cadd9e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Elements
    const factorTypeSelect = document.getElementById("factorType");
    const diseaseClassSelect = document.getElementById("diseaseClass");
    const patientIdInput = document.getElementById("patientId");
    const nidInput = document.getElementById("nid");
    const patientIdError = document.getElementById("patientIdError");
    const nidError = document.getElementById("nidError");
    const imageError = document.getElementById("imageError");
    const submitBtn = document.getElementById("submitBtn");
    const loaderOverlay = document.getElementById("loaderOverlay");
    const dobInput = document.getElementById("dob");
    const ageInput = document.getElementById("age");
    const imageUpload = document.getElementById("imageUpload");
    const openWebcamBtn = document.getElementById("openWebcamBtn");
    const webcamModal = document.getElementById("webcamModal");
    const webcamVideo = document.getElementById("webcamVideo");
    const webcamCanvas = document.getElementById("webcamCanvas");
    const viewfinderBox = document.getElementById("viewfinderBox");
    const closeWebcamBtn = document.getElementById("closeWebcamBtn");
    const captureBtn = document.getElementById("captureBtn");
    const photoStatus = document.getElementById("photoStatus");

    let videoStream = null;
    let imageFileToUpload = null;

    // --- Automatic Selection Logic ---
    factorTypeSelect.addEventListener("change", () => {
      const mapping = {
        "VIII": "Hemophilia A",
        "IX": "Hemophilia B",
        "VWD": "Von Willebrand Disease",
        "Others": "Other"
      };
      
      const selectedValue = factorTypeSelect.value;
      if (mapping[selectedValue]) {
        diseaseClassSelect.value = mapping[selectedValue];
      }
    });

    // Age Calculation
    function calculateAge(dob) {
      if (!dob) return "";
      const birthDate = new Date(dob);
      const currentDate = new Date();
      let age = currentDate.getFullYear() - birthDate.getFullYear();
      const monthDiff = currentDate.getMonth() - birthDate.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && currentDate.getDate() < birthDate.getDate())) {
        age--;
      }
      return age >= 0 ? age : 0;
    }

    dobInput.addEventListener("change", () => {
      ageInput.value = calculateAge(dobInput.value);
    });

    // Utils
    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    async function checkPatientId(patientId) {
      if (!patientId) return false;
      const snapshot = await get(ref(db, `patients/${patientId}`));
      return snapshot.exists();
    }

    async function checkNid(nid) {
      if (!nid) return false;
      const snapshot = await get(ref(db, 'patients'));
      if (snapshot.exists()) {
        const patients = snapshot.val();
        for (const pid in patients) {
          if (patients[pid].nid === nid) return true;
        }
      }
      return false;
    }

    // Validation & Listeners
    const debouncedCheckPatientId = debounce(async (patientId) => {
      try {
        if (await checkPatientId(patientId)) {
          patientIdError.classList.remove("hidden");
          submitBtn.disabled = true;
        } else {
          patientIdError.classList.add("hidden");
          submitBtn.disabled = !nidError.classList.contains("hidden");
        }
      } catch (err) { console.error(err); }
    }, 500);

    patientIdInput.addEventListener("input", () => debouncedCheckPatientId(patientIdInput.value.trim()));

    const debouncedCheckNid = debounce(async (nid) => {
      try {
        if (await checkNid(nid)) {
          nidError.classList.remove("hidden");
          submitBtn.disabled = true;
        } else {
          nidError.classList.add("hidden");
          submitBtn.disabled = !patientIdError.classList.contains("hidden");
        }
      } catch (err) { console.error(err); }
    }, 500);

    nidInput.addEventListener("input", () => debouncedCheckNid(nidInput.value.trim()));

    // Photo Handling
    imageUpload.addEventListener("change", () => {
      if (imageUpload.files && imageUpload.files.length > 0) {
        imageFileToUpload = imageUpload.files[0];
        photoStatus.textContent = "✅ Photo uploaded from device.";
        photoStatus.classList.remove("hidden");
        imageError.classList.add("hidden");
        openWebcamBtn.textContent = "📷 Webcam";
      }
    });

    openWebcamBtn.addEventListener("click", async () => {
      webcamModal.classList.remove("hidden");
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        webcamVideo.srcObject = videoStream;
      } catch (err) {
        alert("Webcam error: " + err.message);
        webcamModal.classList.add("hidden");
      }
    });

    function stopWebcam() {
      if (videoStream) videoStream.getTracks().forEach(track => track.stop());
      webcamVideo.srcObject = null;
      webcamModal.classList.add("hidden");
    }

    closeWebcamBtn.addEventListener("click", stopWebcam);

    captureBtn.addEventListener("click", () => {
      const context = webcamCanvas.getContext("2d");
      const videoWidth = webcamVideo.videoWidth;
      const videoHeight = webcamVideo.videoHeight;
      const displayWidth = webcamVideo.clientWidth;
      const displayHeight = webcamVideo.clientHeight;
      const vBoxRect = viewfinderBox.getBoundingClientRect();
      const videoRect = webcamVideo.getBoundingClientRect();
      const scaleX = videoWidth / displayWidth;
      const scaleY = videoHeight / displayHeight;
      const cropX = (vBoxRect.left - videoRect.left) * scaleX;
      const cropY = (vBoxRect.top - videoRect.top) * scaleY;
      const cropWidth = vBoxRect.width * scaleX;
      const cropHeight = vBoxRect.height * scaleY;
      
      webcamCanvas.width = 500;
      webcamCanvas.height = 500;
      context.drawImage(webcamVideo, cropX, cropY, cropWidth, cropHeight, 0, 0, 500, 500);
      
      webcamCanvas.toBlob((blob) => {
        imageFileToUpload = blob;
        imageUpload.value = "";
        photoStatus.textContent = "✅ Photo captured via viewfinder.";
        photoStatus.classList.remove("hidden");
        imageError.classList.add("hidden");
        openWebcamBtn.textContent = "✅ Captured (Retake)";
        stopWebcam();
      }, "image/jpeg", 0.9);
    });

    // Form Submission
    document.getElementById("patientForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      if (!imageFileToUpload) {
        imageError.classList.remove("hidden");
        return;
      }
      
      loaderOverlay.style.display = "block";
      const patientId = patientIdInput.value.trim();

      try {
        const formData = new FormData();
        formData.append("image", imageFileToUpload, `${patientId}.jpg`);
        formData.append("key", "34586b2f49002bd441a1e6816d633fd9");

        const imgResponse = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData });
        const imgData = await imgResponse.json();

        if (imgData.success) {
          const patientData = { imageUrl: imgData.data.url, timestamp: serverTimestamp() };
          Array.from(e.target.elements).forEach(el => {
            if (el.id && el.type !== "submit" && el.type !== "button") patientData[el.id] = el.value;
          });

          await set(ref(db, 'patients/' + patientId), patientData);
          alert("Patient Registered Successfully!");
          e.target.reset();
          photoStatus.classList.add("hidden");
          imageFileToUpload = null;
          ageInput.value = "";
        } else {
          alert("Image upload failed.");
        }
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        loaderOverlay.style.display = "none";
      }
    });
  </script>
</body>
</html>
