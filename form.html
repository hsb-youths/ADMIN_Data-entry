<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HSB Patient Membership Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loader {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-block;
      position: relative;
      border: 3px solid;
      border-color: #FFF #FFF transparent transparent;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -24px;
      margin-left: -24px;
      z-index: 9999;
      background: transparent;
    }
    .loader::after,
    .loader::before {
      content: '';  
      box-sizing: border-box;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
      border: 3px solid;
      border-color: transparent transparent #FF3D00 #FF3D00;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      box-sizing: border-box;
      animation: rotationBack 0.5s linear infinite;
      transform-origin: center center;
    }
    .loader::before {
      width: 32px;
      height: 32px;
      border-color: #FFF #FFF transparent transparent;
      animation: rotation 1.5s linear infinite;
    }
        
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    } 
    @keyframes rotationBack {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    #loaderOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9998;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

  <div class="container mx-auto p-6 bg-white rounded-lg shadow-lg mt-8">
    <h2 class="text-2xl font-bold text-center text-red-600 mb-6">HSB Membership Registration</h2>
    <form id="patientForm" class="space-y-6">

      <!-- Patient ID, Name, and Age (3 Inputs in a Row) -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="patientId" class="block text-sm font-medium text-gray-700">Patient ID</label>
          <input type="text" id="patientId" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
          <p id="patientIdError" class="text-red-600 text-sm mt-1 hidden">This Patient ID is already registered.</p>
        </div>
        <div class="input-group">
          <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
          <input type="text" id="name" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="age" class="block text-sm font-medium text-gray-700">Age</label>
          <input type="number" id="age" readonly class="mt-1 block w-full p-3 border border-gray-300 rounded-md bg-gray-100" />
        </div>
      </div>

      <!-- Factor Type, Factor Level, Phone Number -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="factorType" class="block text-sm font-medium text-gray-700">Factor Type</label>
          <select id="factorType" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500">
            <option value="" disabled selected>Select Factor Type</option>
            <option value="VIII">Factor VIII</option>
            <option value="IX">Factor IX</option>
            <option value="VWD">VWD</option>
            <option value="Others">Others</option>
          </select>
        </div>
        <div class="input-group">
          <label for="factorLevel" class="block text-sm font-medium text-gray-700">Factor Level</label>
          <input type="text" id="factorLevel" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
          <input type="tel" id="phone" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Home Town, NID, and Image Upload -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="hometown" class="block text-sm font-medium text-gray-700">Home Town</label>
          <input type="text" id="hometown" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="nid" class="block text-sm font-medium text-gray-700">NID/Birth No.</label>
          <input type="text" id="nid" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
          <p id="nidError" class="text-red-600 text-sm mt-1 hidden">This NID is already registered.</p>
        </div>
        <div class="input-group">
          <label for="imageUpload" class="block text-sm font-medium text-gray-700">Upload Photo</label>
          <input type="file" id="imageUpload" accept="image/*" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
          <p id="imageError" class="text-red-600 text-sm mt-1 hidden">Please upload a valid image (JPEG/PNG, max 5MB).</p>
        </div>
      </div>

      <!-- Additional Fields: Date of Membership, Membership Type, Date of Birth -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="membershipDate" class="block text-sm font-medium text-gray-700">Date of Membership</label>
          <input type="date" id="membershipDate" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
   <div class="input-group">
     <label for="membershipType" class="block text-sm font-medium text-gray-700">Membership Type</label>
     <select 
          id="membershipType" 
          class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500"
     >
          <option value="">-- Select --</option>
          <option value="patient">Patient Member</option>
          
          <option value="guardian_member">Guardian Member</option>
     </select>
</div>
        <div class="input-group">
          <label for="dob" class="block text-sm font-medium text-gray-700">Date of Birth</label>
          <input type="date" id="dob" required class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Father and Mother Details -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-group">
          <label for="fatherName" class="block text-sm font-medium text-gray-700">Father's Name</label>
          <input type="text" id="fatherName" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="motherName" class="block text-sm font-medium text-gray-700">Mother's Name</label>
          <input type="text" id="motherName" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Address Fields -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-group">
          <label for="presentAddress" class="block text-sm font-medium text-gray-700">Present Address</label>
          <input type="text" id="presentAddress" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="permanentAddress" class="block text-sm font-medium text-gray-700">Permanent Address</label>
          <input type="text" id="permanentAddress" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Contact Details -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-group">
          <label for="mobile" class="block text-sm font-medium text-gray-700">Mobile No.</label>
          <input type="tel" id="mobile" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="email" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Disease History, Blood Group, Occupation -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="diseaseHistory" class="block text-sm font-medium text-gray-700">Disease History</label>
          <input type="text" id="diseaseHistory" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
       <div class="input-group">
  <label for="bloodGroup" class="block text-sm font-medium text-gray-700">Blood Group</label>
  <select 
    id="bloodGroup" 
    class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500"
  >
    <option value="">-- Select Blood Group --</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
  </select>
</div>
        <div class="input-group">
          <label for="occupation" class="block text-sm font-medium text-gray-700">Occupation</label>
          <input type="text" id="occupation" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Income, Disease Class, Marital Status -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="income" class="block text-sm font-medium text-gray-700">Annual Income</label>
          <input type="text" id="income" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
  <label for="diseaseClass" class="block text-sm font-medium text-gray-700">Disease Class</label>
  <select id="diseaseClass" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500">
    <option>Hemophilia A</option>
    <option>Hemophilia B</option>
    <option>Von Willebrand Disease</option>
    <option>Other</option>
  </select>
</div>
        <div class="input-group">
  <label for="maritalStatus" class="block text-sm font-medium text-gray-700">Marital Status</label>
  <select 
    id="maritalStatus" 
    class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500"
  >
    <option>Single</option>
    <option>Married</option>
    <option>Divorced</option>
  </select>
</div>
      </div>

      <!-- Spouse Name, No. of Children, Nationality -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="input-group">
          <label for="spouse" class="block text-sm font-medium text-gray-700">Spouse Name</label>
          <input type="text" id="spouse" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="children" class="block text-sm font-medium text-gray-700">No. of Children</label>
          <input type="number" id="children" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
        <div class="input-group">
          <label for="nationality" class="block text-sm font-medium text-gray-700">Nationality</label>
          <input type="text" id="nationality" value="Bangladeshi" readonly class="mt-1 block w-full p-3 border border-gray-300 rounded-md bg-gray-100" />
        </div>
      </div>

      <!-- Family History of Hemophilia, Present Affected Organs -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-group">
  <label for="membershipStatus" class="block text-sm font-medium text-gray-700">Membership Status</label>
  <select 
    id="membershipStatus" 
    class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500"
  >
    <option>Annual Membership</option>
    <option>Life Membership</option>
  </select>
</div>
        <div class="input-group">
          <label for="organsAffected" class="block text-sm font-medium text-gray-700">Present Affected Organs</label>
          <input type="text" id="organsAffected" class="mt-1 block w-full p-3 border border-gray-300 rounded-md focus:ring-red-500 focus:border-red-500" />
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn" class="w-full bg-red-600 text-white py-3 rounded-md text-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50">Submit</button>

    </form>
  </div>

  <!-- Loader Overlay -->
  <div id="loaderOverlay">
    <div class="loader"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7QLBLarDiqdpYy5jw8_1e-gTR-aR1Wqc",
      authDomain: "hemophilia-society-of-bd.firebaseapp.com",
      projectId: "hemophilia-society-of-bd",
      storageBucket: "hemophilia-society-of-bd.firebasestorage.app",
      messagingSenderId: "674332798483",
      appId: "1:674332798483:web:cedb62cb05e03b5cadd9e6",
      measurementId: "G-J5D8R7P18D"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    const patientIdInput = document.getElementById("patientId");
    const nidInput = document.getElementById("nid");
    const imageInput = document.getElementById("imageUpload");
    const patientIdError = document.getElementById("patientIdError");
    const nidError = document.getElementById("nidError");
    const imageError = document.getElementById("imageError");
    const submitBtn = document.getElementById("submitBtn");
    const loaderOverlay = document.getElementById("loaderOverlay");
    const dobInput = document.getElementById("dob");
    const ageInput = document.getElementById("age");

    // Function to calculate age from date of birth
    function calculateAge(dob) {
      if (!dob) return "";
      const birthDate = new Date(dob);
      const currentDate = new Date("2025-10-20"); // Current date as provided
      let age = currentDate.getFullYear() - birthDate.getFullYear();
      const monthDiff = currentDate.getMonth() - birthDate.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && currentDate.getDate() < birthDate.getDate())) {
        age--;
      }
      return age >= 0 ? age : 0;
    }

    // Update age when date of birth changes
    dobInput.addEventListener("change", () => {
      const dob = dobInput.value;
      ageInput.value = calculateAge(dob);
    });

    // Debounce function to limit Firebase queries
    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // Function to check if Patient ID exists
    async function checkPatientId(patientId) {
      if (!patientId) return false;
      const patientRef = ref(db, `patients/${patientId}`);
      const snapshot = await get(patientRef);
      return snapshot.exists();
    }

    // Function to check if NID exists
    async function checkNid(nid) {
      if (!nid) return false;
      const patientsRef = ref(db, 'patients');
      const snapshot = await get(patientsRef);
      if (snapshot.exists()) {
        const patients = snapshot.val();
        for (const patientId in patients) {
          if (patients[patientId].nid === nid) {
            return true;
          }
        }
      }
      return false;
    }

    // Validate image file
    function validateImage(file) {
      if (!file) {
        imageError.classList.remove("hidden");
        imageError.textContent = "Please select an image.";
        return false;
      }
      const validTypes = ["image/jpeg", "image/png"];
      if (!validTypes.includes(file.type)) {
        imageError.classList.remove("hidden");
        imageError.textContent = "Please upload a JPEG or PNG image.";
        return false;
      }
      const maxSize = 5 * 1024 * 1024; // 5MB
      if (file.size > maxSize) {
        imageError.classList.remove("hidden");
        imageError.textContent = "Image size must be less than 5MB.";
        return false;
      }
      imageError.classList.add("hidden");
      return true;
    }

    // Real-time validation for Patient ID with debounce
    const debouncedCheckPatientId = debounce(async (patientId) => {
      try {
        const exists = await checkPatientId(patientId);
        if (exists) {
          patientIdError.classList.remove("hidden");
          submitBtn.disabled = true;
          alert("This Patient ID is already registered.");
        } else {
          patientIdError.classList.add("hidden");
          submitBtn.disabled = nidError.classList.contains("hidden") && imageError.classList.contains("hidden") ? false : true;
        }
      } catch (error) {
        console.error("Error checking Patient ID:", error);
        alert("Error validating Patient ID.");
      }
    }, 500);

    patientIdInput.addEventListener("input", () => {
      const patientId = patientIdInput.value.trim();
      debouncedCheckPatientId(patientId);
    });

    // Real-time validation for NID with debounce
    const debouncedCheckNid = debounce(async (nid) => {
      try {
        const exists = await checkNid(nid);
        if (exists) {
          nidError.classList.remove("hidden");
          submitBtn.disabled = true;
          alert("This NID is already registered.");
        } else {
          nidError.classList.add("hidden");
          submitBtn.disabled = patientIdError.classList.contains("hidden") && imageError.classList.contains("hidden") ? false : true;
        }
      } catch (error) {
        console.error("Error checking NID:", error);
        alert("Error validating NID.");
      }
    }, 500);

    nidInput.addEventListener("input", () => {
      const nid = nidInput.value.trim();
      debouncedCheckNid(nid);
    });

    // Real-time validation for image
    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!validateImage(file)) {
        submitBtn.disabled = true;
      } else {
        submitBtn.disabled = patientIdError.classList.contains("hidden") && nidError.classList.contains("hidden") ? false : true;
      }
    });

    document.getElementById("patientForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      loaderOverlay.style.display = "block"; // Show loader

      const patientId = patientIdInput.value.trim();
      const nid = nidInput.value.trim();
      const imageFile = imageInput.files[0];

      try {
        // Validate image before proceeding
        if (!validateImage(imageFile)) {
          loaderOverlay.style.display = "none";
          return;
        }

        // Double-check Patient ID and NID
        const patientExists = await checkPatientId(patientId);
        const nidExists = await checkNid(nid);
        if (patientExists) {
          alert("This Patient ID is already registered.");
          loaderOverlay.style.display = "none";
          return;
        }
        if (nidExists) {
          alert("This NID is already registered.");
          loaderOverlay.style.display = "none";
          return;
        }

        const formData = new FormData();
        formData.append("image", imageFile);
        formData.append("key", "34586b2f49002bd441a1e6816d633fd9");

        const response = await fetch("https://api.imgbb.com/1/upload", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        if (data.success) {
          const imageUrl = data.data.url;
          const formDataObj = {};
          Array.from(e.target.elements).forEach(el => {
            if (el.id && el.type !== "submit" && el.type !== "file") {
              formDataObj[el.id] = el.value;
            }
          });
          formDataObj["imageUrl"] = imageUrl;
          formDataObj["timestamp"] = serverTimestamp();

          await set(ref(db, 'patients/' + patientId), formDataObj);
          alert("Patient Registered Successfully!");
          e.target.reset();
          patientIdError.classList.add("hidden");
          nidError.classList.add("hidden");
          imageError.classList.add("hidden");
          submitBtn.disabled = false;
          ageInput.value = ""; // Reset age field
        } else {
          console.error("ImgBB error:", data.error);
          alert(`Image upload failed: ${data.error?.message || "Unknown error"}`);
        }
      } catch (error) {
        console.error("Submission error:", error);
        alert(`Error during submission: ${error.message || "Unknown error"}`);
      } finally {
        loaderOverlay.style.display = "none"; // Hide loader
      }
    });
  </script>
</body>
</html>
