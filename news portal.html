<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSB News Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="OIP (1).png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafb;
        }
        .event-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #ffffff;
        }
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        .input-focus {
            transition: all 0.3s ease;
        }
        .input-focus:focus {
            border-color: #1e40af;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
            outline: none;
        }
        .header-gradient {
            background: linear-gradient(to right, #1e3a8a, #2563eb);
        }
        .btn-primary {
            background: linear-gradient(to right, #1e40af, #3b82f6);
        }
        .btn-secondary {
            background: linear-gradient(to right, #6b7280, #9ca3af);
        }
        .section-divider {
            border-top: 2px solid #e5e7eb;
        }
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .modal {
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-20px);
        }
        .modal.show {
            transform: translateY(0);
            opacity: 1;
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d1d5db #f3f4f6;
        }
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #f3f4f6;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
        .card-shadow {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .hover-scale {
            transition: transform 0.3s ease;
        }
        .hover-scale:hover {
            transform: scale(1.02);
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="text-gray-900">
    <!-- Header -->
    <header class="header-gradient shadow-lg p-5 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="OIP (1).png" alt="HemoEdu Logo" class="w-12 h-12 rounded-full border-2 border-white">
                <h1 class="text-2xl font-bold text-white font-['Roboto_Slab']">HSB News Portal (ADMIN)</h1>
            </div>
            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-white hover:text-gray-200 font-medium text-lg transition duration-200"><u>Click to Back Dashboard</u></a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6 space-y-12">
        <!-- Add Article Form -->
        <section class="bg-white rounded-2xl shadow-lg p-8 fade-in card-shadow">
            <h2 class="text-2xl font-bold text-gray-800 font-['Roboto_Slab'] mb-6">Add New Article</h2>
            <form id="eventForm" class="grid gap-6 md:grid-cols-2">
                <div class="md:col-span-2">
                    <label for="eventImage" class="block text-sm font-medium text-gray-700 mb-2">Article Image</label>
                    <input type="file" id="eventImage" accept="image/*" class="block w-full text-gray-600 file:mr-4 file:py-3 file:px-5 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white file:hover:bg-blue-700 input-focus">
                    <p class="text-sm text-gray-500 mt-2">Upload an image for the article (optional, max 2MB)</p>
                </div>
                <div>
                    <label for="eventHeading" class="block text-sm font-medium text-gray-700 mb-2">Article Headline</label>
                    <input type="text" id="eventHeading" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="Enter article headline" required>
                </div>
                <div>
                    <label for="postedBy" class="block text-sm font-medium text-gray-700 mb-2">Author</label>
                    <input type="text" id="postedBy" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="Your name" required>
                </div>
                <div class="md:col-span-2">
                    <label for="eventDescription" class="block text-sm font-medium text-gray-700 mb-2">Article Content</label>
                    <textarea id="eventDescription" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" rows="8" placeholder="Write the article content" required></textarea>
                </div>
                <div class="md:col-span-2">
                    <label for="eventLink" class="block text-sm font-medium text-gray-700 mb-2">External Link (Optional)</label>
                    <input type="url" id="eventLink" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="https://example.com">
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="btn-primary text-white px-6 py-3 rounded-lg hover:opacity-90 transition duration-200 font-medium w-full md:w-auto">Add Article</button>
                </div>
            </form>
        </section>

        <!-- Article List -->
        <section class="bg-white rounded-2xl shadow-lg p-8 section-divider fade-in card-shadow">
            <h2 class="text-2xl font-bold text-gray-800 font-['Roboto_Slab'] mb-6">Latest Articles</h2>
            <div id="eventList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <div class="loading-spinner"></div>
            </div>
        </section>
    </main>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full modal-content card-shadow modal">
            <h3 class="text-2xl font-bold text-gray-800 font-['Roboto_Slab'] mb-6">Edit Article</h3>
            <div id="editError" class="error-message hidden"></div>
            <form id="editForm" class="grid gap-6">
                <input type="hidden" id="editEventId">
                <div>
                    <label for="editEventImage" class="block text-sm font-medium text-gray-700 mb-2">Article Image</label>
                    <input type="file" id="editEventImage" accept="image/*" class="block w-full text-gray-600 file:mr-4 file:py-3 file:px-5 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white file:hover:bg-blue-700 input-focus">
                    <p class="text-sm text-gray-500 mt-2">Upload a new image (optional, max 2MB)</p>
                </div>
                <div>
                    <label for="editEventHeading" class="block text-sm font-medium text-gray-700 mb-2">Article Headline</label>
                    <input type="text" id="editEventHeading" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="Enter article headline" required>
                </div>
                <div>
                    <label for="editPostedBy" class="block text-sm font-medium text-gray-700 mb-2">Author</label>
                    <input type="text" id="editPostedBy" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="Your name" required>
                </div>
                <div>
                    <label for="editEventDescription" class="block text-sm font-medium text-gray-700 mb-2">Article Content</label>
                    <textarea id="editEventDescription" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" rows="6" placeholder="Write the article content" required></textarea>
                </div>
                <div>
                    <label for="editEventLink" class="block text-sm font-medium text-gray-700 mb-2">External Link (Optional)</label>
                    <input type="url" id="editEventLink" class="block w-full border border-gray-300 rounded-lg p-3 input-focus placeholder-gray-400" placeholder="https://example.com">
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancelEdit" class="btn-secondary text-white px-6 py-3 rounded-lg hover:opacity-90 transition duration-200 font-medium">Cancel</button>
                    <button type="submit" class="btn-primary text-white px-6 py-3 rounded-lg hover:opacity-90 transition duration-200 font-medium">Update Article</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 modal-overlay flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full card-shadow modal">
            <h3 class="text-lg font-semibold text-gray-800 font-['Roboto_Slab'] mb-4">Confirm Delete</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this article?</p>
            <div class="flex justify-end space-x-4">
                <button id="cancelDelete" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">Cancel</button>
                <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAXJ5U35aQ7ccOr1J5CaAGhhhrdK6nWYbs",
            authDomain: "hemoedu-690d0.firebaseapp.com",
            projectId: "hemoedu-690d0",
            storageBucket: "hemoedu-690d0.firebasestorage.app",
            messagingSenderId: "1056333395683",
            appId: "1:1056333395683:web:5d35ab1b7feaffc8f1f7d6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Handle add form submission
        const eventForm = document.getElementById("eventForm");
        eventForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            const eventImage = document.getElementById("eventImage").files[0];
            const eventHeading = document.getElementById("eventHeading").value;
            const eventDescription = document.getElementById("eventDescription").value;
            const eventLink = document.getElementById("eventLink").value;
            const postedBy = document.getElementById("postedBy").value;

            let imageBase64 = null;
            if (eventImage) {
                if (eventImage.size > 2 * 1024 * 1024) {
                    alert("Image size must be less than 2MB.");
                    return;
                }
                try {
                    imageBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(eventImage);
                    });
                } catch (error) {
                    console.error("Error reading image:", error);
                    alert("Failed to process image. Please try another.");
                    return;
                }
            }

            try {
                await push(ref(db, 'events/'), {
                    heading: eventHeading,
                    description: eventDescription,
                    link: eventLink || null,
                    postedBy: postedBy,
                    image: imageBase64,
                    createdAt: new Date().toISOString()
                });
                alert("Article added successfully!");
                eventForm.reset();
            } catch (error) {
                console.error("Error adding article:", error);
                alert("Failed to add article. Please check your network or Firebase rules.");
            }
        });

        // Display articles
        const eventList = document.getElementById("eventList");
        onValue(ref(db, 'events/'), (snapshot) => {
            eventList.innerHTML = "";
            if (snapshot.exists()) {
                const events = snapshot.val();
                let validEvents = 0;
                snapshot.forEach((childSnapshot) => {
                    const event = childSnapshot.val();
                    const eventId = childSnapshot.key;
                    if (!event.heading || !event.description || !event.postedBy || 
                        typeof event.heading !== 'string' || 
                        typeof event.description !== 'string' || 
                        typeof event.postedBy !== 'string') {
                        console.warn("Invalid event data skipped:", event);
                        return;
                    }
                    if (event.heading.includes('<') || event.description.includes('<') || 
                        event.postedBy.includes('<') || 
                        event.heading.includes('HemoEdu') || 
                        event.description.includes('Add New Article') || 
                        event.postedBy.includes('Welcome, Admin')) {
                        console.warn("Unexpected HTML or page content detected, skipping:", event);
                        return;
                    }
                    validEvents++;
                    const eventElement = document.createElement("div");
                    eventElement.className = "event-card bg-white rounded-lg p-5 shadow-md hover:shadow-lg hover-scale cursor-pointer";
                    eventElement.innerHTML = `
                        <img src="${event.image || 'https://via.placeholder.com/400x200?text=Article+Image'}" alt="${event.heading}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <h3 class="text-lg font-semibold text-gray-800 font-['Roboto_Slab'] mb-2 line-clamp-2">${event.heading}</h3>
                        <p class="text-gray-600 text-sm line-clamp-3 mb-3">${event.description}</p>
                        <p class="text-sm text-gray-500 mb-2">By: ${event.postedBy}</p>
                        ${event.link ? `<a href="${event.link}" class="text-sm text-blue-600 hover:underline block mb-2">Read More</a>` : ''}
                        <p class="text-sm text-gray-400 mb-4">Published: ${new Date(event.createdAt).toLocaleDateString()}</p>
                        <div class="flex space-x-3">
                            <button class="edit-btn text-blue-600 hover:text-blue-800 text-sm font-medium" data-id="${eventId}">Edit</button>
                            <button class="delete-btn text-red-600 hover:text-red-800 text-sm font-medium" data-id="${eventId}">Delete</button>
                        </div>
                    `;
                    eventList.appendChild(eventElement);
                });
                if (validEvents === 0) {
                    eventList.innerHTML = '<p class="text-gray-600 col-span-full text-center py-6 text-lg">No valid articles found. Please add a new article.</p>';
                }
            } else {
                eventList.innerHTML = '<p class="text-gray-600 col-span-full text-center py-6 text-lg">No articles available. Start by adding a new article!</p>';
            }
        }, (error) => {
            console.error("Error fetching articles:", error);
            eventList.innerHTML = '<p class="text-red-600 col-span-full text-center py-6 text-lg">Error loading articles. Please check your network or Firebase configuration.</p>';
        });

        // Edit modal handling
        const editModal = document.getElementById("editModal");
        const editForm = document.getElementById("editForm");
        const editError = document.getElementById("editError");
        const cancelEdit = document.getElementById("cancelEdit");

        eventList.addEventListener("click", async (e) => {
            if (e.target.classList.contains("edit-btn")) {
                const eventId = e.target.dataset.id;
                try {
                    const snapshot = await get(ref(db, `events/${eventId}`));
                    console.log("Edit snapshot:", snapshot.val(), "Event ID:", eventId);
                    if (snapshot.exists()) {
                        const event = snapshot.val();
                        document.getElementById("editEventId").value = eventId;
                        document.getElementById("editEventHeading").value = event.heading || "";
                        document.getElementById("editEventDescription").value = event.description || "";
                        document.getElementById("editEventLink").value = event.link || "";
                        document.getElementById("editPostedBy").value = event.postedBy || "";
                        editError.classList.add("hidden");
                        editModal.classList.remove("hidden");
                        setTimeout(() => editModal.querySelector('.modal').classList.add("show"), 10);
                    } else {
                        editError.textContent = "Article not found. It may have been deleted.";
                        editError.classList.remove("hidden");
                        console.error("No data found for event ID:", eventId);
                    }
                } catch (error) {
                    console.error("Error fetching article for edit:", error.message, error.code);
                    editError.textContent = `Failed to load article: ${error.message}. Please check your network or Firebase permissions.`;
                    editError.classList.remove("hidden");
                    editModal.classList.remove("hidden");
                    setTimeout(() => editModal.querySelector('.modal').classList.add("show"), 10);
                }
            }
        });

        cancelEdit.addEventListener("click", () => {
            editModal.querySelector('.modal').classList.remove("show");
            setTimeout(() => {
                editModal.classList.add("hidden");
                editError.classList.add("hidden");
            }, 300);
            editForm.reset();
        });

        editForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const eventId = document.getElementById("editEventId").value;
            const eventImage = document.getElementById("editEventImage").files[0];
            const eventHeading = document.getElementById("editEventHeading").value;
            const eventDescription = document.getElementById("editEventDescription").value;
            const eventLink = document.getElementById("editEventLink").value;
            const postedBy = document.getElementById("editPostedBy").value;

            let imageBase64 = null;
            if (eventImage) {
                if (eventImage.size > 2 * 1024 * 1024) {
                    alert("Image size must be less than 2MB.");
                    return;
                }
                try {
                    imageBase64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(eventImage);
                    });
                } catch (error) {
                    console.error("Error reading image:", error);
                    editError.textContent = "Failed to process image. Please try another.";
                    editError.classList.remove("hidden");
                    return;
                }
            }

            try {
                const snapshot = await get(ref(db, `events/${eventId}`));
                if (!snapshot.exists()) {
                    editError.textContent = "Article no longer exists. It may have been deleted.";
                    editError.classList.remove("hidden");
                    return;
                }
                const eventData = {
                    heading: eventHeading,
                    description: eventDescription,
                    link: eventLink || null,
                    postedBy: postedBy,
                    image: imageBase64 || snapshot.val().image,
                    createdAt: snapshot.val().createdAt
                };
                await update(ref(db, `events/${eventId}`), eventData);
                alert("Article updated successfully!");
                editModal.querySelector('.modal').classList.remove("show");
                setTimeout(() => {
                    editModal.classList.add("hidden");
                    editError.classList.add("hidden");
                }, 300);
                editForm.reset();
            } catch (error) {
                console.error("Error updating article:", error.message, error.code);
                editError.textContent = `Failed to update article: ${error.message}. Please check your network or Firebase permissions.`;
                editError.classList.remove("hidden");
            }
        });

        // Delete modal handling
        const deleteModal = document.getElementById("deleteModal");
        const confirmDelete = document.getElementById("confirmDelete");
        const cancelDelete = document.getElementById("cancelDelete");
        let deleteEventId = null;

        eventList.addEventListener("click", (e) => {
            if (e.target.classList.contains("delete-btn")) {
                deleteEventId = e.target.dataset.id;
                deleteModal.classList.remove("hidden");
                setTimeout(() => deleteModal.querySelector('.modal').classList.add("show"), 10);
            }
        });

        cancelDelete.addEventListener("click", () => {
            deleteModal.querySelector('.modal').classList.remove("show");
            setTimeout(() => deleteModal.classList.add("hidden"), 300);
            deleteEventId = null;
        });

        confirmDelete.addEventListener("click", async () => {
            if (deleteEventId) {
                try {
                    await remove(ref(db, `events/${deleteEventId}`));
                    alert("Article deleted successfully!");
                    deleteModal.querySelector('.modal').classList.remove("show");
                    setTimeout(() => deleteModal.classList.add("hidden"), 300);
                    deleteEventId = null;
                } catch (error) {
                    console.error("Error deleting article:", error);
                    alert("Failed to delete article. Please check your network or Firebase permissions.");
                }
            }
        });
    </script>
</body>
</html>
