<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Emergency Prescription</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Include html2canvas and jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 p-6 text-gray-800">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6 text-red-700">জরুরি প্রেসক্রিপশন খুঁজুন</h1>

    <!-- Search Box -->
    <div class="flex items-center gap-4 mb-4">
      <input id="searchInput" type="text" placeholder="রোগীর আইডি লিখুন"
        class="flex-grow border border-gray-300 rounded-md px-4 py-2" />
      <button id="searchBtn" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-md">অনুসন্ধান</button>
    </div>

    <!-- Loader -->
    <div id="loader" class="hidden text-center text-red-500 font-medium mb-4">লোড হচ্ছে...</div>

    <!-- Search Result -->
    <div id="resultContainer" class="mb-6"></div>

    <!-- Prescription Input -->
    <div id="prescriptionForm" class="hidden">
      <div class="bg-white p-6 rounded-xl shadow-lg space-y-4">
        <h3 class="text-xl font-semibold text-red-700">জরুরি প্রেসক্রিপশন তথ্য দিন</h3>
        <input id="bleedingOrgan" type="text" placeholder="রক্তপাতের অঙ্গ (যেমন: হাঁটু)"
          class="w-full px-4 py-2 border rounded-md border-gray-300" />
        <input id="bleedingDuration" type="number" placeholder="রক্তপাতের সময়কাল (ঘন্টা)"
          class="w-full px-4 py-2 border rounded-md border-gray-300" />
        <button onclick="generatePrescription()"
          class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-md font-semibold">
          প্রেসক্রিপশন তৈরি করুন
        </button>
      </div>
    </div>

    <!-- Prescription Output -->
    <div class="mt-8 space-y-4">
      <div id="prescriptionOutput"></div>
      <button id="downloadBtn" onclick="downloadPDF()" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-md">
        প্রেসক্রিপশন ডাউনলোড করুন (PDF)
      </button>
    </div>
  </div>

  <!-- Firebase + Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7QLBLarDiqdpYy5jw8_1e-gTR-aR1Wqc",
      authDomain: "hemophilia-society-of-bd.firebaseapp.com",
      projectId: "hemophilia-society-of-bd",
      storageBucket: "hemophilia-society-of-bd.appspot.com",
      messagingSenderId: "674332798483",
      appId: "1:674332798483:web:cedb62cb05e03b5cadd9e6",
      measurementId: "G-J5D8R7P18D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const resultContainer = document.getElementById("resultContainer");
    const prescriptionForm = document.getElementById("prescriptionForm");
    const prescriptionOutput = document.getElementById("prescriptionOutput");
    const loader = document.getElementById("loader");
    const downloadBtn = document.getElementById("downloadBtn");

    let currentPatient = null;

    const fetchPatientInfo = async () => {
      const patientId = searchInput.value.trim();
      if (!patientId) {
        alert("Please enter a Patient ID.");
        return;
      }

      resultContainer.innerHTML = '';
      prescriptionOutput.innerHTML = '';
      downloadBtn.classList.add("hidden");
      loader.classList.remove("hidden");

      try {
        const snapshot = await get(ref(db, 'patients/' + patientId));
        loader.classList.add("hidden");

        if (snapshot.exists()) {
          currentPatient = snapshot.val();
          prescriptionForm.classList.remove("hidden");

          resultContainer.innerHTML = `
            <div class="bg-white p-6 rounded-xl shadow-lg">
              <h3 class="text-2xl font-bold text-blue-600 mb-4">Patient Found</h3>
              <p><strong>ID:</strong> ${currentPatient.patientId}</p>
              <p><strong>Name:</strong> ${currentPatient.name}</p>
              <p><strong>DOB:</strong> ${currentPatient.dob}</p>
              <p><strong>Phone:</strong> ${currentPatient.phone}</p>
            </div>
          `;
        } else {
          resultContainer.innerHTML = `<div class="text-red-600 text-center font-semibold mt-4">Patient not found.</div>`;
          prescriptionForm.classList.add("hidden");
        }
      } catch (error) {
        console.error(error);
        loader.classList.add("hidden");
        resultContainer.innerHTML = `<div class="text-red-600 text-center font-semibold mt-4">Error fetching data. Try again later.</div>`;
      }
    };

    window.generatePrescription = () => {
      const organ = document.getElementById("bleedingOrgan").value.trim();
      const duration = document.getElementById("bleedingDuration").value.trim();
      if (!organ || !duration) {
        alert("দয়া করে সব তথ্য পূরণ করুন");
        return;
      }

      const prescriptionDate = new Date().toLocaleDateString('bn-BD');

      prescriptionOutput.innerHTML = `
        <div id="prescriptionCard" class="relative bg-white dark:bg-gray-900 rounded-lg p-8 border border-gray-200 dark:border-gray-600 shadow-lg">
          <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-red-500 to-red-700 dark:from-red-400 dark:to-red-600"></div>
          <div class="flex justify-between items-center mb-6">
            <div>
              <h3 class="text-2xl font-extrabold text-red-700 dark:text-red-400">হিমোফিলিয়া সোসাইটি অব বাংলাদেশ</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400">১২৩ মেডিকেল রোড, ঢাকা, বাংলাদেশ</p>
              <p class="text-sm text-gray-600 dark:text-gray-400">ফোন: +৮৮০-২-৫৫০০০০০ | ইমেইল: info@hemophilia.org.bd</p>
            </div>
            <img src="OIP\ (1).png" alt="Logo" class="w-16 h-16 object-contain" />
          </div>
          <hr class="border-gray-300 dark:border-gray-600 mb-6" />
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="space-y-2">
              <p class="text-sm"><span class="font-semibold">রোগীর নাম:</span> ${currentPatient.name}</p>
              <p class="text-sm"><span class="font-semibold">রোগীর আইডি:</span> ${currentPatient.patientId}</p>
              <p class="text-sm"><span class="font-semibold">জন্ম তারিখ:</span> ${currentPatient.dob}</p>
            </div>
            <div class="space-y-2">
              <p class="text-sm"><span class="font-semibold">তারিখ:</span> ${prescriptionDate}</p>
              <p class="text-sm"><span class="font-semibold">ফোন:</span> ${currentPatient.phone}</p>
            </div>
          </div>
          <div class="mb-6">
            <h4 class="text-lg font-semibold text-red-600 dark:text-red-400 mb-3">চিকিৎসার বিবরণ</h4>
            <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg">
              <p class="text-sm"><span class="font-medium">রক্তপাতের অঙ্গ:</span> ${organ}</p>
              <p class="text-sm"><span class="font-medium">রক্তপাতের সময়কাল:</span> ${duration} ঘণ্টা</p>
            </div>
          </div>
          <div class="mb-6">
            <h4 class="text-lg font-semibold text-red-600 dark:text-red-400 mb-3">প্রেসক্রিপশন</h4>
            <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg">
              <p class="text-sm"><span class="font-medium">ঔষধ:</span> Factor VIII</p>
              <p class="text-sm"><span class="font-medium">ডোজ:</span> ৫০০ আইইউ, অবিলম্বে শিরায় প্রয়োগ করতে হবে</p>
              <p class="text-sm"><span class="font-medium">নির্দেশনা:</span> ২৪ ঘণ্টার মধ্যে চিকিৎসকের পরামর্শ নিন</p>
            </div>
          </div>
          <hr class="border-gray-300 dark:border-gray-600 mb-6" />
          <div class="flex justify-between items-center">
            <div>
              <p class="text-sm font-semibold">অনুমোদিত:</p>
              <p class="text-lg font-bold text-red-700 dark:text-red-400">ডাঃ এম. রহমান</p>
              <p class="text-sm">হিমোফিলিয়া বিশেষজ্ঞ</p>
            </div>
            <img src="1.png" alt="Doctor Signature" class="h-12 object-contain" />
          </div>
          <div class="mt-6 text-center text-xs text-gray-500 dark:text-gray-400">
            <p>এই প্রেসক্রিপশন শুধুমাত্র জরুরি ব্যবহারের জন্য। দয়া করে নিকটস্থ চিকিৎসকের সাথে যোগাযোগ করুন।</p>
          </div>
        </div>
      `;
      downloadBtn.classList.remove("hidden");
    };

    window.downloadPDF = async () => {
      const card = document.getElementById("prescriptionCard");
      const canvas = await html2canvas(card, { scale: 2 });
      const imgData = canvas.toDataURL("image/png");

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');

      const pdfWidth = 210;
      const imgProps = pdf.getImageProperties(imgData);
      const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

      pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
      pdf.save("prescription.pdf");
    };

    searchBtn.addEventListener("click", fetchPatientInfo);
  </script>
</body>
</html>
